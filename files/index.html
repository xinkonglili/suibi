<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MQ Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --bg1: #111418;
    --bg2: #181c22;
    --bg3: #1e232c;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #c8cdd6;
    --text2: #7a8294;
    --text3: #4a5568;
    --green: #4ade80;
    --green-dim: rgba(74,222,128,0.12);
    --amber: #f59e0b;
    --amber-dim: rgba(245,158,11,0.12);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.12);
    --blue: #60a5fa;
    --blue-dim: rgba(96,165,250,0.12);
    --cyan: #22d3ee;
    --font-mono: 'JetBrains Mono', monospace;
    --font-display: 'Space Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none;
    z-index: 1000;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg1);
  }

  .logo {
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    animation: blink 2s ease-in-out infinite;
    box-shadow: 0 0 8px var(--green);
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .conn-status {
    font-size: 11px;
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .conn-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text3);
    transition: all 0.3s;
  }
  .conn-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .conn-dot.error { background: var(--red); }

  /* ── Layout ── */
  .app {
    display: grid;
    grid-template-columns: 260px 1fr 300px;
    grid-template-rows: auto 1fr;
    height: calc(100vh - 57px);
  }

  /* ── Sidebar left: controls ── */
  .sidebar-left {
    border-right: 1px solid var(--border);
    background: var(--bg1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-header {
    padding: 12px 16px;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text3);
    border-bottom: 1px solid var(--border);
    font-weight: 600;
  }

  /* stats */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
  }

  .stat-cell {
    background: var(--bg1);
    padding: 14px 16px;
  }

  .stat-num {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
    transition: all 0.3s;
  }
  .stat-num.flash { color: var(--green); }

  .stat-label {
    font-size: 10px;
    color: var(--text3);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* compose */
  .compose {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }

  .field-label {
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }

  select, input[type=text] {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 8px 10px;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 10px;
    appearance: none;
  }
  select:focus, input:focus { border-color: var(--cyan); }

  .btn {
    width: 100%;
    padding: 9px;
    border: 1px solid;
    border-radius: 4px;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 6px;
  }
  .btn:active { transform: scale(0.98); }

  .btn-primary {
    background: rgba(34,211,238,0.1);
    border-color: var(--cyan);
    color: var(--cyan);
  }
  .btn-primary:hover { background: rgba(34,211,238,0.18); }

  .btn-batch {
    background: rgba(245,158,11,0.1);
    border-color: var(--amber);
    color: var(--amber);
  }
  .btn-batch:hover { background: rgba(245,158,11,0.18); }

  .btn-danger {
    background: transparent;
    border-color: var(--border2);
    color: var(--text2);
  }
  .btn-danger:hover { border-color: var(--red); color: var(--red); }

  /* consumers panel */
  .consumers-section {
    padding: 16px;
    flex: 1;
    overflow-y: auto;
  }

  .consumer-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 4px;
    border: 1px solid var(--border);
    margin-bottom: 8px;
    background: var(--bg2);
    transition: all 0.3s;
  }

  .consumer-item.busy {
    border-color: rgba(245,158,11,0.4);
    background: rgba(245,158,11,0.05);
  }

  .consumer-icon { font-size: 18px; }

  .consumer-info { flex: 1; }
  .consumer-name { font-size: 12px; font-weight: 500; color: var(--text); }
  .consumer-status {
    font-size: 10px;
    margin-top: 2px;
    color: var(--text3);
    transition: color 0.3s;
  }
  .consumer-status.busy { color: var(--amber); }
  .consumer-status.idle { color: var(--green); }

  .consumer-badge {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    transition: all 0.3s;
  }
  .consumer-badge.busy {
    background: var(--amber);
    box-shadow: 0 0 6px var(--amber);
    animation: pulse 0.8s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── Center: queue visualization ── */
  .center-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* queue visual */
  .queue-visual {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    min-height: 120px;
  }

  .queue-track {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    min-height: 52px;
  }

  .queue-arrow {
    font-size: 16px;
    color: var(--text3);
    margin: 0 4px;
  }

  .q-bubble {
    padding: 5px 12px;
    border-radius: 3px;
    font-size: 11px;
    font-weight: 500;
    border: 1px solid;
    animation: bubble-in 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    cursor: default;
  }

  @keyframes bubble-in {
    from { transform: scale(0) translateY(-10px); opacity: 0; }
    to   { transform: scale(1) translateY(0);     opacity: 1; }
  }

  .q-bubble.order   { background: var(--blue-dim); border-color: rgba(96,165,250,0.3); color: var(--blue); }
  .q-bubble.register{ background: var(--green-dim); border-color: rgba(74,222,128,0.3); color: var(--green); }
  .q-bubble.cancel  { background: var(--red-dim); border-color: rgba(248,113,113,0.3); color: var(--red); }
  .q-bubble.refund  { background: var(--amber-dim); border-color: rgba(245,158,11,0.3); color: var(--amber); }

  .q-empty {
    color: var(--text3);
    font-size: 11px;
    letter-spacing: 0.05em;
  }

  /* flow diagram */
  .flow-diagram {
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 0;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }

  .flow-node {
    padding: 8px 14px;
    border-radius: 4px;
    border: 1px solid var(--border2);
    background: var(--bg2);
    font-size: 11px;
    text-align: center;
    white-space: nowrap;
    transition: all 0.3s;
  }
  .flow-node.active { border-color: var(--cyan); color: var(--cyan); background: rgba(34,211,238,0.06); }

  .flow-arrow {
    flex: 1;
    min-width: 20px;
    height: 1px;
    background: var(--border2);
    position: relative;
    margin: 0 4px;
  }
  .flow-arrow::after {
    content: '›';
    position: absolute;
    right: -6px;
    top: -8px;
    color: var(--text3);
    font-size: 13px;
  }

  /* log */
  .log-panel {
    flex: 1;
    overflow-y: auto;
    padding: 0;
  }

  .log-entry {
    display: flex;
    gap: 10px;
    padding: 7px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    font-size: 11.5px;
    line-height: 1.5;
    animation: log-slide 0.2s ease-out;
  }

  @keyframes log-slide {
    from { opacity:0; transform: translateX(-8px); }
    to   { opacity:1; transform: translateX(0); }
  }

  .log-ts { color: var(--text3); white-space: nowrap; min-width: 80px; }
  .log-level {
    white-space: nowrap;
    min-width: 58px;
    font-weight: 600;
    font-size: 10px;
    letter-spacing: 0.06em;
  }
  .log-level.INFO  { color: var(--cyan); }
  .log-level.QUEUE { color: var(--blue); }
  .log-level.CONSUME { color: var(--amber); }
  .log-level.ACK   { color: var(--green); }
  .log-level.NACK  { color: var(--red); }
  .log-level.WARN  { color: var(--amber); }

  .log-body { color: var(--text2); flex: 1; }
  .log-body b { color: var(--text); font-weight: 500; }

  /* ── Sidebar right: history ── */
  .sidebar-right {
    border-left: 1px solid var(--border);
    background: var(--bg1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .history-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .history-item {
    padding: 9px 12px;
    border-radius: 4px;
    border: 1px solid var(--border);
    margin-bottom: 5px;
    background: var(--bg2);
    transition: all 0.3s;
    font-size: 11px;
  }

  .history-item.acked  { border-left: 2px solid var(--green); }
  .history-item.nacked { border-left: 2px solid var(--red); }
  .history-item.consuming { border-left: 2px solid var(--amber); animation: pulse 1s infinite; }
  .history-item.queued { border-left: 2px solid var(--blue); }

  .hi-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }

  .hi-type { font-weight: 600; color: var(--text); }
  .hi-status {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 2px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .hi-status.acked    { background: var(--green-dim); color: var(--green); }
  .hi-status.nacked   { background: var(--red-dim); color: var(--red); }
  .hi-status.consuming{ background: var(--amber-dim); color: var(--amber); }
  .hi-status.queued   { background: var(--blue-dim); color: var(--blue); }

  .hi-payload { color: var(--text3); font-size: 10.5px; margin-bottom: 3px; }
  .hi-meta { color: var(--text3); font-size: 10px; display: flex; gap: 8px; }
  .hi-consumer { color: var(--cyan); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }

  /* breadcrumb in center top */
  .breadcrumb {
    padding: 10px 24px;
    font-size: 10px;
    color: var(--text3);
    border-bottom: 1px solid var(--border);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: var(--bg1);
  }

  .tag { display: inline-block; padding: 1px 6px; border-radius: 2px; font-size: 10px; font-weight: 600; }
  .tag-cyan { background: rgba(34,211,238,0.12); color: var(--cyan); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    MQ CONSOLE
  </div>
  <div style="display:flex;align-items:center;gap:20px">
    <span class="tag tag-cyan">Go Backend</span>
    <div class="conn-status">
      <div class="conn-dot" id="conn-dot"></div>
      <span id="conn-text">connecting...</span>
    </div>
  </div>
</header>

<div class="app">

  <!-- ── Left sidebar ── -->
  <aside class="sidebar-left">
    <div class="panel-header">统计数据</div>
    <div class="stats-grid">
      <div class="stat-cell">
        <div class="stat-num" id="s-sent">0</div>
        <div class="stat-label">发送</div>
      </div>
      <div class="stat-cell">
        <div class="stat-num" id="s-queued">0</div>
        <div class="stat-label">积压</div>
      </div>
      <div class="stat-cell">
        <div class="stat-num" id="s-consumed">0</div>
        <div class="stat-label">消费</div>
      </div>
      <div class="stat-cell">
        <div class="stat-num" id="s-acked">0</div>
        <div class="stat-label">ACK</div>
      </div>
    </div>

    <div class="compose">
      <div class="field-label">消息类型</div>
      <select id="msg-type">
        <option value="order">📦 订单支付</option>
        <option value="register">👤 用户注册</option>
        <option value="cancel">❌ 订单取消</option>
        <option value="refund">💸 退款申请</option>
      </select>
      <div class="field-label">Payload</div>
      <input type="text" id="msg-payload" value="orderId:10086" />
      <button class="btn btn-primary" onclick="sendMsg()">→ 发布消息</button>
      <button class="btn btn-batch" onclick="batchSend()">⚡ 批量 ×10</button>
      <button class="btn btn-danger" onclick="clearQueue()">✕ 清空队列</button>
    </div>

    <div class="panel-header">消费者</div>
    <div class="consumers-section" id="consumers-section">
      <!-- populated by JS -->
    </div>
  </aside>

  <!-- ── Center ── -->
  <main class="center-panel">
    <div class="breadcrumb">
      Producer → Exchange → Queue → Consumers &nbsp;|&nbsp; SSE 实时推送
    </div>

    <div class="flow-diagram">
      <div class="flow-node active" id="fn-producer">Producer</div>
      <div class="flow-arrow"></div>
      <div class="flow-node" id="fn-exchange">Exchange</div>
      <div class="flow-arrow"></div>
      <div class="flow-node" id="fn-queue">Queue</div>
      <div class="flow-arrow"></div>
      <div class="flow-node" id="fn-consumer">Consumers</div>
    </div>

    <div class="queue-visual">
      <div class="panel-header" style="padding:0 0 10px 0;border-bottom:none;font-size:10px">
        当前队列 &nbsp;<span id="queue-count" style="color:var(--cyan)">0 条消息</span>
      </div>
      <div class="queue-track" id="queue-track">
        <span class="q-empty">— 队列为空 —</span>
      </div>
    </div>

    <div class="log-panel" id="log-panel">
      <!-- log entries -->
    </div>
  </main>

  <!-- ── Right sidebar ── -->
  <aside class="sidebar-right">
    <div class="panel-header">消息历史 <span id="history-count" style="color:var(--cyan)"></span></div>
    <div class="history-list" id="history-list">
      <!-- populated by JS -->
    </div>
  </aside>

</div>

<script>
const API = 'http://localhost:8080/api';
let history = [];
let consumers = [];
let queueIds = [];
let stats = {};
let eventSource = null;

const msgTypeLabels = { order:'订单支付', register:'用户注册', cancel:'订单取消', refund:'退款申请' };
const msgTypeIcons  = { order:'📦', register:'👤', cancel:'❌', refund:'💸' };

// ── SSE ──────────────────────────────────────────────
function connectSSE() {
  eventSource = new EventSource(`${API}/events`);

  eventSource.onopen = () => {
    setConn(true);
    addLog('INFO', '已连接到后端 SSE 推送');
  };

  eventSource.onmessage = (e) => {
    const evt = JSON.parse(e.data);
    handleEvent(evt);
  };

  eventSource.onerror = () => {
    setConn(false);
    setTimeout(connectSSE, 3000);
  };
}

function handleEvent(evt) {
  switch (evt.type) {
    case 'stats':
      updateStats(evt.payload); break;
    case 'consumers':
      consumers = evt.payload; renderConsumers(); break;
    case 'consumer_update':
      const idx = consumers.findIndex(c => c.id === evt.payload.id);
      if (idx >= 0) consumers[idx] = evt.payload;
      renderConsumers(); break;
    case 'history':
      history = evt.payload || [];
      renderHistory(); break;
    case 'queue_snapshot':
      queueIds = evt.payload || [];
      renderQueueTrack(); break;
    case 'message_queued':
      addHistoryItem(evt.payload);
      addLog('QUEUE', `消息入队 <b>${evt.payload.id}</b> type=<b>${evt.payload.type}</b> payload=${evt.payload.payload}`);
      flashNode('fn-queue');
      break;
    case 'message_consuming':
      updateHistoryItem(evt.payload);
      addLog('CONSUME', `[${evt.payload.consumer}] 开始消费 <b>${evt.payload.id}</b>`);
      flashNode('fn-consumer');
      break;
    case 'message_acked':
      updateHistoryItem(evt.payload);
      addLog('ACK', `[${evt.payload.consumer}] ACK 确认 ✓ <b>${evt.payload.id}</b>`);
      break;
    case 'message_nacked':
      updateHistoryItem(evt.payload);
      addLog('NACK', `消息 NACK 重新入队 <b>${evt.payload.id}</b>`);
      break;
  }
}

// ── render ──────────────────────────────────────────
function updateStats(s) {
  stats = s;
  setStatNum('s-sent', s.sent);
  setStatNum('s-queued', s.queued);
  setStatNum('s-consumed', s.consumed);
  setStatNum('s-acked', s.acked);
}

function setStatNum(id, val) {
  const el = document.getElementById(id);
  if (el.textContent !== String(val)) {
    el.textContent = val;
    el.classList.add('flash');
    setTimeout(() => el.classList.remove('flash'), 400);
  }
}

function renderConsumers() {
  const sec = document.getElementById('consumers-section');
  sec.innerHTML = '';
  (consumers || []).forEach(c => {
    const div = document.createElement('div');
    div.className = `consumer-item${c.status==='busy' ? ' busy' : ''}`;
    div.innerHTML = `
      <span class="consumer-icon">${c.icon}</span>
      <div class="consumer-info">
        <div class="consumer-name">${c.name}</div>
        <div class="consumer-status ${c.status}">${c.status === 'busy' ? '处理中...' : '空闲'}</div>
      </div>
      <div class="consumer-badge ${c.status}"></div>
    `;
    sec.appendChild(div);
  });
}

function renderQueueTrack() {
  const track = document.getElementById('queue-track');
  document.getElementById('queue-count').textContent = `${queueIds.length} 条消息`;
  track.innerHTML = '';
  if (queueIds.length === 0) {
    track.innerHTML = '<span class="q-empty">— 队列为空 —</span>';
    return;
  }
  // Show latest 12
  const show = queueIds.slice(-12);
  if (queueIds.length > 12) {
    const more = document.createElement('span');
    more.style.cssText = 'color:var(--text3);font-size:11px';
    more.textContent = `+${queueIds.length - 12} 更多...`;
    track.appendChild(more);
  }
  show.forEach(id => {
    const m = history.find(h => h.id === id);
    const type = m ? m.type : 'order';
    const el = document.createElement('div');
    el.className = `q-bubble ${type}`;
    el.textContent = m ? `${msgTypeIcons[type]} ${id.slice(-5)}` : id.slice(-5);
    track.appendChild(el);
  });
}

function addHistoryItem(msg) {
  const existing = history.find(h => h.id === msg.id);
  if (!existing) {
    history.unshift(msg);
    if (history.length > 100) history.pop();
  }
  renderHistory();
}

function updateHistoryItem(msg) {
  const idx = history.findIndex(h => h.id === msg.id);
  if (idx >= 0) history[idx] = msg;
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('history-list');
  document.getElementById('history-count').textContent = `(${history.length})`;
  list.innerHTML = '';
  history.slice(0, 50).forEach(msg => {
    const el = document.createElement('div');
    el.className = `history-item ${msg.status}`;
    const ts = new Date(msg.createdAt).toLocaleTimeString('zh-CN',{hour12:false});
    el.innerHTML = `
      <div class="hi-top">
        <span class="hi-type">${msgTypeIcons[msg.type]||''} ${msgTypeLabels[msg.type]||msg.type}</span>
        <span class="hi-status ${msg.status}">${statusLabel(msg.status)}</span>
      </div>
      <div class="hi-payload">${msg.payload}</div>
      <div class="hi-meta">
        <span>${ts}</span>
        ${msg.consumer ? `<span class="hi-consumer">${msg.consumer}</span>` : ''}
        <span style="color:var(--text3)">${msg.id.slice(-8)}</span>
      </div>
    `;
    list.appendChild(el);
  });
}

function statusLabel(s) {
  return {queued:'QUEUED',consuming:'CONSUME',acked:'ACK',nacked:'NACK'}[s] || s.toUpperCase();
}

function addLog(level, html) {
  const panel = document.getElementById('log-panel');
  const d = new Date();
  const ts = d.toLocaleTimeString('zh-CN',{hour12:false}) + '.' + String(d.getMilliseconds()).padStart(3,'0');
  const el = document.createElement('div');
  el.className = 'log-entry';
  el.innerHTML = `<span class="log-ts">${ts}</span><span class="log-level ${level}">${level}</span><span class="log-body">${html}</span>`;
  panel.insertBefore(el, panel.firstChild);
  if (panel.children.length > 200) panel.removeChild(panel.lastChild);
}

function flashNode(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.add('active');
  setTimeout(() => el.classList.remove('active'), 600);
}

// ── actions ──────────────────────────────────────────
async function sendMsg() {
  const type = document.getElementById('msg-type').value;
  const payload = document.getElementById('msg-payload').value || `${type}Id:${Date.now()}`;
  flashNode('fn-producer');
  flashNode('fn-exchange');
  try {
    await fetch(`${API}/publish`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({type, payload})
    });
  } catch(e) {
    addLog('WARN', `发送失败: ${e.message}`);
  }
}

async function batchSend() {
  for (let i = 0; i < 10; i++) {
    setTimeout(sendMsg, i * 120);
  }
}

async function clearQueue() {
  try {
    await fetch(`${API}/clear`, {method:'POST'});
    addLog('WARN', '队列已清空');
  } catch(e) {
    addLog('WARN', `清空失败: ${e.message}`);
  }
}

// ── conn status ──────────────────────────────────────
function setConn(ok) {
  const dot = document.getElementById('conn-dot');
  const txt = document.getElementById('conn-text');
  dot.className = 'conn-dot ' + (ok ? 'connected' : 'error');
  txt.textContent = ok ? `ws://localhost:8080` : '重连中...';
}

// auto-update payload hint
document.getElementById('msg-type').addEventListener('change', function() {
  const map = {order:'orderId:10086',register:'userId:user_001',cancel:'cancelId:98765',refund:'refundId:55443'};
  document.getElementById('msg-payload').value = map[this.value] || '';
});

// start
connectSSE();
addLog('INFO', 'MQ Console 已启动，等待后端连接...');
</script>
</body>
</html>
